on:
  workflow_dispatch:
  
name: Deploy Dash
  
jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      # Give the default GITHUB_TOKEN write permission to commit and push the
      # added or changed files to the repository.
      contents: write

    steps:
      # to access the code inside our repository
      - name: Check out repository
        uses: actions/checkout@v4

      # that installs R on the machine
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          # The R version to download (if necessary) and use.
          r-version: '4.3.3'
          # uses the RStudio Package Manager
          use-public-rspm: true

      # install system dependencies required by some R packages
      - name: Install required system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libudunits2-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libtiff5-dev \
            libproj-dev \
            libgdal-dev \
            libgeos-dev 

      # install main R packages
      - name: Install required R packages
        run: |
          Rscript -e 'install.packages(c(
            "ggplot2", "geobr", "plotly", "stringr", "ragg", "httr",
            "rsconnect", "shiny", "quarto",
            "cpp11", "systemfonts", "textshaping", "tidyr", "bslib"
          ), repos="https://packagemanager.posit.co/cran/latest")'

          # install rmarkdown separately to avoid silent failure
          Rscript -e 'install.packages("rmarkdown", repos="https://packagemanager.posit.co/cran/latest")'

      # verify rmarkdown installation explicitly
      - name: Check rmarkdown
        run: |
          Rscript -e 'if (!requireNamespace("rmarkdown", quietly = TRUE)) stop("rmarkdown not installed")'

      # set up Quarto
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      # render Quarto file
      - name: Render Quarto Project
        run: quarto render dash.qmd

      # deploy
      - name: deploy
        run: Rscript -e 'source("deploy.R")'
        env:
          NAME: ${{ vars.NAME }}
          TOKEN: ${{ secrets.TOKEN }}
          SECRET: ${{ secrets.SECRET }}

      # set current date as env variable
      - name: Set current date as env variable
        run: echo "NOW=$(date +'%Y-%m-%dT%H:%M:%S')" >> $GITHUB_ENV

      - name: Echo current date
        run: echo $NOW 

      # commit all changed files back to the repository
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: data updated ${{ env.NOW }}
